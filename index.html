<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Astronomia | Aulas e apresentações</title>
  <style>
    :root {
      --bg: #050505;
      --panel: #101010;
      --line: #343434;
      --text: #f4f4f1;
      --muted: #aaa69c;
      --accent: #d7b46a;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      background: var(--bg);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: min(1040px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 34px 0;
    }

    header {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      align-items: end;
      padding-bottom: 18px;
      border-bottom: 1px solid var(--line);
    }

    h1 {
      margin: 0;
      font-size: clamp(34px, 5vw, 62px);
      line-height: 1.02;
    }

    p {
      margin: 10px 0 0;
      color: var(--muted);
      line-height: 1.55;
    }

    .badge {
      color: var(--accent);
      border: 1px solid var(--line);
      padding: 8px 10px;
      font-size: 12px;
      white-space: nowrap;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 12px;
      margin-top: 22px;
    }

    a.card {
      min-height: 118px;
      padding: 16px;
      color: var(--text);
      background: linear-gradient(180deg, var(--panel), #0b0b0b);
      border: 1px solid var(--line);
      text-decoration: none;
    }

    a.card:hover,
    a.card:focus-visible {
      border-color: var(--accent);
      outline: none;
    }

    .card strong {
      display: block;
      color: var(--accent);
      margin-bottom: 8px;
      font-size: 18px;
    }

    .card span {
      color: var(--muted);
      line-height: 1.45;
      font-size: 14px;
    }

    @media (max-width: 760px) {
      header {
        display: grid;
      }

      .badge {
        justify-self: start;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1>Astronomia</h1>
        <p>Apresentações, dashboards e materiais interativos de aula.</p>
      </div>
      <div class="badge">Prof. Dr. Rafael Camargo Rodrigues de Lima</div>
    </header>

    <section class="grid" aria-label="Apresentações disponíveis">
      <a class="card" href="precessao-mercurio/">
        <strong>Precessão da órbita de Mercúrio</strong>
        <span>Problema histórico, limites da gravitação newtoniana, relatividade geral e dashboards interativos.</span>
      </a>
    </section>
  </main>
</body>
</html>
