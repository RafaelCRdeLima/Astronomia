<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Apresentação | Precessão de Mercúrio</title>
  <style>
    :root {
      --bg: #050505;
      --panel: rgb(5 5 5 / 78%);
      --line: #343434;
      --text: #f4f4f1;
      --muted: #aaa69c;
      --accent: #d7b46a;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      color: var(--text);
      background: var(--bg);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .stage {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      background: #000;
    }

    img {
      width: 100vw;
      height: 100vh;
      object-fit: contain;
      display: block;
      user-select: none;
    }

    .toolbar {
      position: fixed;
      left: 16px;
      right: 16px;
      bottom: 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px;
      color: var(--text);
      background: var(--panel);
      border: 1px solid var(--line);
      backdrop-filter: blur(8px);
      transition: opacity 160ms ease;
    }

    .toolbar.dim {
      opacity: 0.18;
    }

    .group {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    button,
    a {
      min-height: 34px;
      padding: 7px 10px;
      color: var(--text);
      background: #0b0b0b;
      border: 1px solid var(--line);
      text-decoration: none;
      font: inherit;
      font-size: 13px;
      cursor: pointer;
      white-space: nowrap;
    }

    button:hover,
    a:hover,
    button:focus-visible,
    a:focus-visible {
      color: var(--accent);
      border-color: var(--accent);
      outline: none;
    }

    .counter {
      color: var(--accent);
      min-width: 62px;
      text-align: center;
      font-variant-numeric: tabular-nums;
      font-size: 13px;
    }

    .hint {
      color: var(--muted);
      font-size: 12px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    @media (max-width: 760px) {
      .toolbar {
        display: grid;
      }

      .group {
        flex-wrap: wrap;
      }
    }
  </style>
</head>
<body>
  <main class="stage" aria-label="Apresentação">
    <img id="slide" src="slides/slide-01.jpg" alt="Slide 1">
  </main>

  <nav class="toolbar" id="toolbar" aria-label="Controles da apresentação">
    <div class="group">
      <button id="prev" type="button">Anterior</button>
      <div class="counter" id="counter">1 / 57</div>
      <button id="next" type="button">Próximo</button>
      <button id="fullscreen" type="button">Tela cheia</button>
    </div>
    <div class="hint">Setas ou espaço navegam; F ativa tela cheia.</div>
    <div class="group">
      <a href="dashboard_orbita_mercurio.html" target="_blank" rel="noopener">Dashboard orbital</a>
      <a href="dashboard_tempo_proprio.html" target="_blank" rel="noopener">Dashboard relógios</a>
      <a href="apresentacao_precessao_mercurio.pdf" target="_blank" rel="noopener">PDF</a>
    </div>
  </nav>

  <script>
    const totalSlides = 57;
    const slide = document.getElementById("slide");
    const counter = document.getElementById("counter");
    const toolbar = document.getElementById("toolbar");
    let current = 1;
    let dimTimer = null;

    function slideName(number) {
      return `slides/slide-${String(number).padStart(2, "0")}.jpg`;
    }

    function showToolbar() {
      toolbar.classList.remove("dim");
      clearTimeout(dimTimer);
      dimTimer = setTimeout(() => toolbar.classList.add("dim"), 2200);
    }

    function setSlide(number, push = true) {
      current = Math.min(totalSlides, Math.max(1, number));
      slide.src = slideName(current);
      slide.alt = `Slide ${current}`;
      counter.textContent = `${current} / ${totalSlides}`;
      if (push) {
        history.replaceState(null, "", `#${current}`);
      }
      showToolbar();
    }

    function toggleFullscreen() {
      if (document.fullscreenElement) {
        document.exitFullscreen();
      } else {
        document.documentElement.requestFullscreen();
      }
    }

    document.getElementById("prev").addEventListener("click", () => setSlide(current - 1));
    document.getElementById("next").addEventListener("click", () => setSlide(current + 1));
    document.getElementById("fullscreen").addEventListener("click", toggleFullscreen);
    document.addEventListener("mousemove", showToolbar);
    document.addEventListener("keydown", (event) => {
      if (event.key === "ArrowRight" || event.key === " " || event.key === "PageDown") {
        event.preventDefault();
        setSlide(current + 1);
      }
      if (event.key === "ArrowLeft" || event.key === "PageUp") {
        event.preventDefault();
        setSlide(current - 1);
      }
      if (event.key.toLowerCase() === "f") {
        event.preventDefault();
        toggleFullscreen();
      }
      if (event.key === "Home") setSlide(1);
      if (event.key === "End") setSlide(totalSlides);
    });

    const hashSlide = Number(location.hash.replace("#", ""));
    setSlide(Number.isFinite(hashSlide) && hashSlide > 0 ? hashSlide : 1, false);
  </script>
</body>
</html>
